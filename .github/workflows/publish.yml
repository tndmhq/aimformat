name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install build frontend (pinned per repo convention)
        # 1.5.1 was yanked from PyPI ("considers breaking changes") —
        # re-check yanked status whenever this pin is touched
        run: pip install build==1.5.0
      - name: Build sdist and wheel
        run: python -m build
      - name: Assert the built version matches the release tag
        run: |
          ls -l dist/
          test -f "dist/aimformat-${GITHUB_REF_NAME#v}.tar.gz"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aimformat
    permissions:
      # Required for PyPI Trusted Publishing (OIDC) — no API tokens.
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
