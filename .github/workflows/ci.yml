name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e '.[dev]'
      - name: Ruff lint
        run: ruff check src tests scripts
      - name: Ruff format check
        run: ruff format --check src tests scripts
      - name: Mypy
        run: mypy src

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Test (includes executable spec snippets + conformance fixtures)
        run: python3 -m pytest
      - name: Lint the shipped examples with the CLI
        run: aim lint examples/*.aim

  converters:
    # the real PDF exporter (Playwright Chromium) and docling ingest — the
    # test job's dev-only install turns these paths into skips
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install with the converter extras
        run: pip install -e '.[convert,pdf,dev]'
      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium
      - name: Converter and pagesetup tests (real exporters, skips reported)
        run: python3 -m pytest tests/test_convert.py tests/test_ingest_export.py tests/test_ingest_inline.py tests/test_pagesetup.py -rs

  ts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ts/package-lock.json
      - name: Install
        run: npm ci
      - name: Prettier check
        run: npm run format:check
      - name: Typecheck
        run: npm run typecheck
      - name: Test (includes the cross-implementation parity goldens)
        run: npm test
